name: Schema Check

on:
  schedule:
    - cron: "0 9 * * 1"  # Monday 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  schema-check:
    name: Check MONEI GraphQL Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch schema via introspection
        id: introspect
        run: |
          RESPONSE=$(curl -s -X POST "https://graphql.monei.com" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ __schema { queryType { fields { name } } mutationType { fields { name } } } }"}' \
            2>/dev/null || echo '{"error":"fetch_failed"}')

          echo "$RESPONSE" | python3 -c "
          import json, sys
          try:
              data = json.load(sys.stdin)
              queries = sorted([f['name'] for f in data.get('data',{}).get('__schema',{}).get('queryType',{}).get('fields',[])])
              mutations = sorted([f['name'] for f in data.get('data',{}).get('__schema',{}).get('mutationType',{}).get('fields',[])])
              print('QUERIES=' + ','.join(queries))
              print('MUTATIONS=' + ','.join(mutations))
          except:
              print('QUERIES=ERROR')
              print('MUTATIONS=ERROR')
          " >> "$GITHUB_OUTPUT"

      - name: Compare with baseline
        id: diff
        run: |
          QUERIES="${{ steps.introspect.outputs.QUERIES }}"
          if [[ "$QUERIES" == ERROR* ]] || [[ -z "$QUERIES" ]]; then
            echo "status=error" >> "$GITHUB_OUTPUT"
            echo "message=Failed to introspect. May require API key authentication." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Baseline: all known queries as of v0.2.0
          BASELINE="account,accountBalances,accountInvoice,accountInvoices,accountSettlement,accountSettlements,applePayCert,applePayCerts,authorizedUsers,availablePaymentMethods,availableProcessors,banks,blacklistItem,blacklistItems,capitalDataByAccount,capitalLoanDocument,capitalLoanRepayments,capitalLoan,capitalLoans,capitalOnboardingDetails,chargeEvents,chargeSources,charge,chargesDateRangeKPI,chargesExport,chargesExports,charges,code,codes,countries,document,documents,events,exportSftpConfig,exportSftpConfigs,getShopifyShopSettings,identity,liveAccount,notificationsPortalUrl,paymentEmailPreview,paymentRule,paymentRules,pointOfSale,pointsOfSale,posAuthToken,previewPaymentEmail,previewSubscriptionEmail,providerConfig,provider,providers,representative,representatives,settlementEvents,shopifyStores,shortLink,store,stores,subscriptionEmailPreview,subscriptionEvents,subscription,subscriptions,userAccounts,userEvents,userPointOfSale,userStore,webReport,webhook,webhooks,zendeskAuthToken"

          NEW=""
          IFS=',' read -ra CURRENT <<< "$QUERIES"
          IFS=',' read -ra KNOWN <<< "$BASELINE"
          for q in "${CURRENT[@]}"; do
            FOUND=false
            for k in "${KNOWN[@]}"; do
              [[ "$q" == "$k" ]] && FOUND=true && break
            done
            [[ "$FOUND" == "false" ]] && [[ -n "$q" ]] && NEW="$NEW $q"
          done

          if [[ -n "$NEW" ]]; then
            echo "status=new_operations" >> "$GITHUB_OUTPUT"
            echo "new_ops=$NEW" >> "$GITHUB_OUTPUT"
          else
            echo "status=no_change" >> "$GITHUB_OUTPUT"
          fi

      - name: Open issue for new operations
        if: steps.diff.outputs.status == 'new_operations'
        uses: actions/github-script@v7
        with:
          script: |
            const ops = '${{ steps.diff.outputs.new_ops }}'.trim().split(/\s+/).map(o => `- \`${o}\``).join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `🆕 New MONEI GraphQL operations (${new Date().toISOString().split('T')[0]})`,
              body: `## New Operations Detected\n\n${ops}\n\n### Next Steps\n1. Review in [MONEI GraphQL docs](https://docs.monei.com/apis/graphql/)\n2. Decide if any should become MCP tools\n3. Check if any need RESTRICTED_OPERATIONS\n4. Update baseline in schema-check.yml`,
              labels: ['enhancement', 'schema-change'],
            });

      - name: Open issue on error
        if: steps.diff.outputs.status == 'error'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `⚠️ Schema check failed (${new Date().toISOString().split('T')[0]})`,
              body: '${{ steps.diff.outputs.message }}\n\nMay need MONEI_API_KEY as repository secret.',
              labels: ['bug', 'ci'],
            });
